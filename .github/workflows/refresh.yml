name: Refresh heat map data

on:
  schedule:
    # 4 runs/day, scheduled 5 hours after each 6-hourly GFS cycle.
    # The frontend picks the appropriate forecast hour client-side, so we
    # only need a fresh fetch per cycle (every 6 h), not per hour.
    - cron: '13 5,11,17,23 * * *'
  workflow_dispatch:

concurrency:
  group: refresh-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install eccodes (required for GRIB2 reading)
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes-dev libeccodes-tools

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install Python dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Fetch GFS cycles and write cities_live.json
        run: |
          python pipeline/fetch_gfs.py \
            --cities pipeline/cities.csv \
            --climatology climatology/era5_doy_clim.parquet \
            --output data/cities_live.json

      - name: Commit and push if changed
        run: |
          git config user.name  "heatmap-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/cities_live.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-refresh heat map data $(date -u +'%Y-%m-%d %H:%MZ')"
            git push
          fi

      - name: Upload data as artifact (debug aid)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: cities_live-${{ github.run_number }}
          path: data/cities_live.json
          retention-days: 7
