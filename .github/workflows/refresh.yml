name: Refresh heat map data

on:
  schedule:
    # Every 3 hours, offset 1h after each GFS cycle (cycles run 00/06/12/18Z;
    # data is available ~3-4h later, so we run at 04, 07, 10, 13, 16, 19, 22, 01 UTC).
    # GFS only releases new data every 6 hours, but running 3-hourly means we
    # always show data within ~3-6 hours of issue, and lets us recover quickly
    # from any failed run.
    - cron: '0 1,4,7,10,13,16,19,22 * * *'
  workflow_dispatch:  # manual trigger button in the Actions UI

# Prevent overlapping runs (a slow run shouldn't be lapped by the next cron)
concurrency:
  group: refresh-data
  cancel-in-progress: false

permissions:
  contents: write   # to commit updated data file back to the repo

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install eccodes (required for GRIB2 reading)
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes-dev libeccodes-tools

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install Python dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Fetch latest GFS cycle and write cities_live.json
        run: |
          python pipeline/fetch_gfs.py \
            --cities pipeline/cities.csv \
            --climatology climatology/era5_doy_clim.parquet \
            --output data/cities_live.json

      - name: Commit and push if changed
        run: |
          git config user.name  "heatmap-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/cities_live.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-refresh heat map data $(date -u +'%Y-%m-%d %H:%MZ')"
            git push
          fi

      - name: Upload data as artifact (debug aid for failed runs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cities_live-${{ github.run_number }}
          path: data/cities_live.json
          retention-days: 7
