name: Refresh heat map data

on:
  schedule:
    # Hourly. The fetcher always picks the latest *available* GFS cycle and
    # the forecast hour whose valid time is closest to clock-now, so an
    # hourly cron means displayed data is never more than ~60 minutes stale.
    - cron: '13 * * * *'
  workflow_dispatch:  # manual trigger button in the Actions UI

# Prevent overlapping runs (a slow run shouldn't be lapped by the next cron)
concurrency:
  group: refresh-data
  cancel-in-progress: false

permissions:
  contents: write   # to commit updated data file back to the repo

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install eccodes (required for GRIB2 reading)
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes-dev libeccodes-tools

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install Python dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Fetch latest GFS cycle and write cities_live.json
        run: |
          python pipeline/fetch_gfs.py \
            --cities pipeline/cities.csv \
            --climatology climatology/era5_doy_clim.parquet \
            --output data/cities_live.json

      - name: Commit and push if changed
        run: |
          git config user.name  "heatmap-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/cities_live.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-refresh heat map data $(date -u +'%Y-%m-%d %H:%MZ')"
            git push
          fi

      - name: Upload data as artifact (debug aid for failed runs)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: cities_live-${{ github.run_number }}
          path: data/cities_live.json
          retention-days: 7
